<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Doom 3 - Codespace Edition</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: 'Courier New', monospace; }
        canvas { width: 800px; height: 600px; border: 2px solid #222; background: #111; }
        #status { margin: 20px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="status">Engine Loaded. Initializing Game Data...</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        var statusElement = document.getElementById('status');
        var Module = {
            canvas: document.getElementById('canvas'),
            setStatus: function(text) { 
                statusElement.innerHTML = text || "Doom 3 is Ready"; 
            },
            locateFile: function(path) {
                // Fetch the massive data file from the mirror
                if (path.endsWith(".data")) {
                    return "https://d3wasm.com/demo_bootstrap.data";
                }
                // Use the d3wasm.wasm you just curled into your folder
                return path; 
            }
        };

        // Load the local script you curled
        var s = document.createElement('script');
        s.src = "d3wasm.js";
        s.async = true;
        document.body.appendChild(s);
    </script>
</body>
</html>
